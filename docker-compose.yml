services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./:/var/www
        depends_on:
            - db
        networks:
            - laravel-net

    web:
        image: nginx:stable-alpine3.23
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - laravel-net

    db:
        image: mysql:8.0
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_USER: ${DB_DATABASE}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - db-data:/var/lib/mysql
        networks:
            - laravel-net

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        platform: linux/amd64
        ports:
            - "8888:80"
        environment:
            PMA_HOST: ${DB_HOST}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        networks:
            - laravel-net

    mailpit:
        image: axllent/mailpit:v1.30
        ports:
            - "8025:8025" # Web UI
            - "1025:1025" # SMTPポート
        networks:
            - laravel-net

    queue:
        build:
            context: .
            dockerfile: Dockerfile
        command: php artisan queue:listen --timeout=1000
        # command: php artisan queue:work --timeout=1000
        volumes:
            - ./:/var/www
        # restart: always
        depends_on:
            - app
            - redis

    redis:
        image: redis:7-alpine
        networks:
            - laravel-net

volumes:
    db-data:

networks:
    laravel-net:
